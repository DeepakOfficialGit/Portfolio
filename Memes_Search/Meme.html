<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memes Search</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="Meme.css">

  <link rel="website icon" type="png" href="Image/Meme_icon.png">

</head>

<body>

  <div class="container">

    <h1 class="mb-4 text-center">Memes Search</h1>

    <div class="d-flex justify-content-center mb-3 gap-2 flex-wrap align-items-center">
      <input type="text" id="searchInput" class="form-control w-50" placeholder="Search memes or GIFs" />
      <button id="searchBtn" class="btn btn-primary">Search</button>

      <select id="limitSelect" class="form-select w-auto ms-2">
        <option value="3" selected>3</option>
        <option value="6">6</option>
        <option value="9">9</option>
        <option value="12">12</option>
        <option value="50">Max</option>
      </select>
    </div>

    <div id="message" class="text-center text-muted mb-3"></div>

    <div id="gifContainer" class="row g-3"></div>

  </div>

  <script src="Meme.js"></script>
</body>

</html>
