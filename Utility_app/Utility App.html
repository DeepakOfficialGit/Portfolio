<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility App</title>
    <script src="Utility_app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="website icon" type="jpg" href="web_icon.jpg">
    <link rel="stylesheet" href="Utility_app.css">
</head>
<body class="bg-gray-100 font-roboto">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold text-center mb-8">Utility App</h1>
        
        <!-- Background Color Selector Icon -->
        <div class="fixed top-4 right-4">
            <i class="fas fa-palette text-4xl text-blue-500 cursor-pointer" onclick="toggleBgColorSelector()"></i>
        </div>

        <!-- Background Color Selector -->
        <div id="bgColorSelector" class="bg-white p-6 rounded-lg shadow-lg mb-8 hidden">
            <h2 class="text-2xl font-bold mb-4">Select Background Color</h2>
            <div class="color-selector">
                <div class="color-option bg-gray-100" onclick="changeBgColor('bg-gray-100')"></div>
                <div class="color-option bg-blue-100" onclick="changeBgColor('bg-blue-100')"></div>
                <div class="color-option bg-green-100" onclick="changeBgColor('bg-green-100')"></div>
                <div class="color-option bg-yellow-100" onclick="changeBgColor('bg-yellow-100')"></div>
                <div class="color-option bg-red-100" onclick="changeBgColor('bg-red-100')"></div>
            </div>
        </div>

        <!-- Icons for different utilities -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-lg text-center cursor-pointer" onclick="showSection('ageCalculator')">
                <i class="fas fa-birthday-cake text-4xl icon-color mb-4"></i>
                <p class="text-lg font-bold">Age Calculator</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-lg text-center cursor-pointer" onclick="showSection('bmiCalculator')">
                <i class="fas fa-weight text-4xl icon-color mb-4"></i>
                <p class="text-lg font-bold">BMI Calculator</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-lg text-center cursor-pointer" onclick="showSection('dataConverter')">
                <i class="fas fa-database text-4xl icon-color mb-4"></i>
                <p class="text-lg font-bold">Data Converter</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-lg text-center cursor-pointer" onclick="showSection('tempConverter')">
                <i class="fas fa-thermometer-half text-4xl icon-color mb-4"></i>
                <p class="text-lg font-bold">Temperature Converter</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-lg text-center cursor-pointer" onclick="showSection('numeralConverter')">
                <i class="fas fa-calculator text-4xl icon-color mb-4"></i>
                <p class="text-lg font-bold">Numeral System Converter</p>
            </div>
        </div>

        <!-- Age Calculator -->
        <div id="ageCalculator" class="bg-white p-6 rounded-lg shadow-lg mb-8 hidden">
            <h2 class="text-2xl font-bold mb-4">Age Calculator</h2>
            <div class="mb-4">
                <label for="birthdate" class="block text-gray-700">Enter your birthdate:</label>
                <div class="flex space-x-2">
                    <input type="number" id="birthDay" class="w-1/3 p-2 border border-gray-300 rounded mt-2" placeholder="Day">
                    <input type="number" id="birthMonth" class="w-1/3 p-2 border border-gray-300 rounded mt-2" placeholder="Month">
                    <input type="number" id="birthYear" class="w-1/3 p-2 border border-gray-300 rounded mt-2" placeholder="Year">
                </div>
            </div>
            <button onclick="calculateAge()" class="bg-blue-500 text-white px-4 py-2 rounded">Calculate Age</button>
            <p id="ageResult" class="mt-4 text-gray-700"></p>
        </div>

        <!-- BMI Calculator -->
        <div id="bmiCalculator" class="bg-white p-6 rounded-lg shadow-lg mb-8 hidden">
            <h2 class="text-2xl font-bold mb-4">BMI Calculator</h2>
            <div class="mb-4">
                <label for="weight" class="block text-gray-700">Weight:</label>
                <div class="flex">
                    <input type="number" id="weight" class="w-full p-2 border border-gray-300 rounded mt-2" placeholder="Enter weight">
                    <select id="weightUnit" class="ml-2 p-2 border border-gray-300 rounded mt-2">
                        <option value="kg">kg</option>
                        <option value="gram">gram</option>
                        <option value="pound">pound</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label for="height" class="block text-gray-700">Height:</label>
                <div class="flex">
                    <input type="number" id="height" class="w-full p-2 border border-gray-300 rounded mt-2" placeholder="Enter height">
                    <select id="heightUnit" class="ml-2 p-2 border border-gray-300 rounded mt-2">
                        <option value="cm">cm</option>
                        <option value="feet">feet</option>
                        <option value="meter">meter</option>
                    </select>
                </div>
            </div>
            <button onclick="calculateBMI()" class="bg-blue-500 text-white px-4 py-2 rounded">Calculate BMI</button>
            <p id="bmiResult" class="mt-4 text-gray-700"></p>
        </div>

        <!-- Data Converter -->
        <div id="dataConverter" class="bg-white p-6 rounded-lg shadow-lg mb-8 hidden">
            <h2 class="text-2xl font-bold mb-4">Data Converter</h2>
            <div class="mb-4">
                <label for="dataInput" class="block text-gray-700">Enter data:</label>
                <div class="flex">
                    <input type="number" id="dataInput" class="w-full p-2 border border-gray-300 rounded mt-2" placeholder="Enter data">
                    <select id="dataUnit" class="ml-2 p-2 border border-gray-300 rounded mt-2">
                        <option value="bytes">Bytes</option>
                        <option value="kb">KB</option>
                        <option value="mb">MB</option>
                        <option value="gb">GB</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label for="convertTo" class="block text-gray-700">Convert to:</label>
                <select id="convertTo" class="w-full p-2 border border-gray-300 rounded mt-2">
                    <option value="bytes">Bytes</option>
                    <option value="kb">KB</option>
                    <option value="mb">MB</option>
                    <option value="gb">GB</option>
                </select>
            </div>
            <button onclick="convertData()" class="bg-blue-500 text-white px-4 py-2 rounded">Convert Data</button>
            <p id="dataResult" class="mt-4 text-gray-700"></p>
        </div>

        <!-- Temperature Converter -->
        <div id="tempConverter" class="bg-white p-6 rounded-lg shadow-lg mb-8 hidden">
            <h2 class="text-2xl font-bold mb-4">Temperature Converter</h2>
            <div class="mb-4">
                <label for="tempInput" class="block text-gray-700">Enter temperature:</label>
                <div class="flex">
                    <input type="number" id="tempInput" class="w-full p-2 border border-gray-300 rounded mt-2" placeholder="Enter temperature">
                    <select id="tempUnit" class="ml-2 p-2 border border-gray-300 rounded mt-2">
                        <option value="celsius">Celsius</option>
                        <option value="fahrenheit">Fahrenheit</option>
                        <option value="kelvin">Kelvin</option>
                    </select>
                </div>
            </div>
            <button onclick="convertTemperature()" class="bg-blue-500 text-white px-4 py-2 rounded">Convert Temperature</button>
            <p id="tempResult" class="mt-4 text-gray-700"></p>
        </div>

        <!-- Numeral System Converter -->
        <div id="numeralConverter" class="bg-white p-6 rounded-lg shadow-lg mb-8 hidden">
            <h2 class="text-2xl font-bold mb-4">Numeral System Converter</h2>
            <div class="mb-4">
                <label for="decimalInput" class="block text-gray-700">Enter a number:</label>
                <div class="flex">
                    <input type="number" id="decimalInput" class="w-full p-2 border border-gray-300 rounded mt-2" placeholder="Enter number">
                    <select id="numeralSystem" class="ml-2 p-2 border border-gray-300 rounded mt-2">
                        <option value="decimal">Decimal</option>
                        <option value="binary">Binary</option>
                        <option value="octal">Octal</option>
                        <option value="hexadecimal">Hexadecimal</option>
                    </select>
                </div>
            </div>
            <button onclick="convertNumeralSystem()" class="bg-blue-500 text-white px-4 py-2 rounded">Convert Number</button>
            <p id="numeralResult" class="mt-4 text-gray-700"></p>
        </div>
    </div>
</body>
</html>
