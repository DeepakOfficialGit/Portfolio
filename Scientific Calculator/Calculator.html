<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <script src="Calculator.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="website icon" type="png" href="web_icon.png">
    <link rel="stylesheet" href="Calculator.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div id="calculator" class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md relative">
        <div class="flex justify-between items-center mb-4 relative">
            <button class="text-gray-600 bg-transparent" onclick="toggleLeftPanel()">
                <i class="fas fa-bars text-2xl"></i>
            </button>
            <button class="text-gray-600 bg-transparent" onclick="toggleHistory()">
                <i class="fas fa-history text-2xl"></i>
            </button>
            <button class="text-gray-600 bg-transparent" onclick="toggleCalculationPanel('area')">
                <i class="fas fa-ruler-combined text-2xl"></i>
            </button>
            <button class="text-gray-600 bg-transparent" onclick="toggleCalculationPanel('length')">
                <i class="fas fa-ruler-horizontal text-2xl"></i>
            </button>
            <button class="text-gray-600 bg-transparent" onclick="toggleCalculationPanel('volume')">
                <i class="fas fa-cube text-2xl"></i>
            </button>
        </div>
        <div class="mb-4">
            <input type="text" id="display" class="w-full p-4 text-right text-2xl border border-gray-300 rounded" readonly>
        </div>
        <div class="grid grid-cols-4 gap-2 mb-4">
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="clearDisplay()">C</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="deleteLast()">DEL</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('(')">(</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay(')')">)</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('7')">7</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('8')">8</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('9')">9</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('/')">/</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('4')">4</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('5')">5</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('6')">6</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('*')">*</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('1')">1</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('2')">2</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('3')">3</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('-')">-</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('0')">0</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('.')">.</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="calculateResult()">=</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('+')">+</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('sin(')">sin</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('cos(')">cos</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('tan(')">tan</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('log(')">log</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('sqrt(')">√</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('^')">^</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('pi')">π</button>
            <button class="bg-gray-200 p-4 rounded text-xl" onclick="appendToDisplay('e')">e</button>
        </div>
        <div id="historyPanel" class="history-panel fixed top-0 right-0 h-full w-64 bg-white shadow-lg p-4 overflow-y-auto">
            <h2 class="text-xl font-bold mb-2">History</h2>
            <ul id="history" class="list-disc pl-5 text-gray-700"></ul>
        </div>
        <div id="calculationPanel" class="calculation-panel fixed top-0 right-0 h-full w-64 bg-white shadow-lg p-4 overflow-y-auto">
            <h2 id="calculationTitle" class="text-xl font-bold mb-2">Calculation</h2>
            <div id="calculationContent"></div>
        </div>
        <div id="leftPanel" class="left-panel fixed top-0 left-0 h-full w-64 bg-white shadow-lg p-4 overflow-y-auto">
            <h2 class="text-xl font-bold mb-2">Options</h2>
            <button class="text-gray-600 bg-transparent w-full text-left mb-2" onclick="changeCalculatorColor()">
                <i class="fas fa-palette text-2xl"></i>
            </button>
            <button class="text-gray-600 bg-transparent w-full text-left mb-2" onclick="changeButtonColor()">
                <i class="fas fa-palette text-2xl"></i>
            </button>
        </div>
    </div>
</body>
</html>
