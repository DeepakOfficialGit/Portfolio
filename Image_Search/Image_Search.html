<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Search</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="website icon" type="png" href="Image/IS_icon.png">

    <style>
        body {
            background-image: url(Image/IS_bg.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.5s ease;
        }

        body.hide-background {
            background-image: none; /* hide background image */
        }

        img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="input-group mt-5 pt-5 w-50 mx-auto">
            <input type="text" class="form-control" id="sname" placeholder="Search Image" />
            <button id="click" class="btn btn-primary">Enter</button>
        </div>

        <div id="image" class="row mt-4 g-3"></div>
    </div>

    <script src="Image_Search.js"></script>
</body>
</html>
