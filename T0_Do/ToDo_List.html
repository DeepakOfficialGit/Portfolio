<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />
  
  <link rel="stylesheet" href="ToDo_List.css">

  <link rel="website icon" type="png" href="Image/TODO_icon.png">
</head>
<body>

  <div class="todo-card">
    <div class="todo-header">
      <i class="bi bi-list-check"></i>
      <h1>To-Do List</h1>
    </div>

    <div class="input-group mb-3">
      <input type="text" id="taskInput" class="form-control" placeholder="What tasks do you have today?" />
      <button id="addTaskBtn" class="btn btn-primary">Add</button>
    </div>

    <ul id="taskList" class="list-group"></ul>
  </div>

  <script src="ToDo_List.js"></script>
</body>
</html>
